
<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quipper PH — Org Explorer</title>
<style>
:root{--navy:#1F3864;--blue:#2E5496;--ink:#1b2330;--mut:#6b7686;--line:#e7ebf2;--bg:#eef2f8;--card:#fff;--gold:#E0A02C;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink)}
.hidden{display:none!important}
#gate{position:fixed;inset:0;background:linear-gradient(135deg,#16233f,#2E5496);display:flex;align-items:center;justify-content:center;z-index:100}
.gate-card{background:#fff;border-radius:16px;padding:38px 34px;width:344px;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.35)}
.gate-card h1{font-size:20px;color:var(--navy);margin-bottom:6px}.gate-card p{font-size:13px;color:var(--mut);margin-bottom:18px}
.gate-card input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;margin-bottom:12px}
.gate-card button{width:100%;padding:12px;border:0;border-radius:10px;background:var(--navy);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.gate-err{color:#c0392b;font-size:12.5px;height:16px;margin-bottom:6px}
header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hwrap{max-width:1240px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{font-weight:800;color:var(--navy);font-size:16px;cursor:pointer;white-space:nowrap}.logo span{color:var(--gold)}
.tabs{display:flex;gap:6px;background:#eef2f8;border-radius:10px;padding:4px}
.tabs button{border:0;background:none;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer}
.tabs button.on{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.search{flex:1;min-width:170px;position:relative}
.search input{width:100%;padding:9px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:13px}
.sresults{position:absolute;top:42px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 16px 40px rgba(0,0,0,.14);max-height:340px;overflow:auto;z-index:40}
.sresults div{padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid #f1f4f9}
.sresults div:hover{background:#f3f7ff}.sresults small{color:var(--mut)}
.prog{display:flex;align-items:center;gap:9px}.bar{width:120px;height:8px;background:#e7ecf4;border-radius:6px;overflow:hidden}
.bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--gold));transition:width .6s}
.lvl{font-size:11.5px;color:var(--mut)}.lvl b{color:var(--navy)}
.live{font-size:11px;padding:3px 9px;border-radius:20px;background:#eef3ff;color:var(--blue);font-weight:600}
.live.on{background:#e8f7ee;color:#1e8a4c}
main{max-width:1240px;margin:0 auto;padding:18px 20px 60px}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.toolbar .hint{font-size:12.5px;color:var(--mut)}
.tbtn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 12px;font-size:12.5px;cursor:pointer;color:var(--blue);font-weight:600}
.tbtn:hover{background:#f3f7ff}
/* tree */
.tree{margin-top:4px}
.kids{margin-left:20px;padding-left:16px;border-left:2px solid #dde4ef;overflow:hidden;transition:opacity .2s}
.node{margin:7px 0;animation:fade .25s both}
.nrow{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;position:relative}
.nrow:hover{transform:translateX(2px);box-shadow:0 6px 18px rgba(31,56,100,.10);border-color:#cdd8ea}
.nrow .rail{width:5px;align-self:stretch;border-radius:5px;flex-shrink:0}
.nrow .chev{width:18px;text-align:center;color:var(--mut);font-size:12px;transition:transform .2s;flex-shrink:0}
.nrow.open .chev{transform:rotate(90deg)}
.nrow .av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex-shrink:0}
.nrow .body{flex:1;min-width:0}
.nrow .lab{font-size:14.5px;font-weight:650;line-height:1.18;color:var(--ink)}
.nrow .sub{font-size:12px;color:var(--mut);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nrow .cnt{font-size:11.5px;font-weight:700;color:#fff;background:var(--blue);border-radius:20px;padding:3px 10px;flex-shrink:0}
.nrow .tag{font-size:10.5px;font-weight:700;border-radius:20px;padding:3px 9px;flex-shrink:0}
.tag.lead{background:#fff4e0;color:#9a6b1a}.tag.role{background:#eef3ff;color:var(--blue)}
.leaf .lab{font-weight:600}
.hl{outline:3px solid var(--gold);outline-offset:2px;border-radius:12px}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.rootcard{background:linear-gradient(120deg,var(--navy),#33508a);color:#fff;border:0}
.rootcard .lab,.rootcard .sub{color:#fff}.rootcard .sub{opacity:.85}
/* panel */
#scrim{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:40;opacity:0;pointer-events:none;transition:.2s}
#scrim.on{opacity:1;pointer-events:auto}
#panel{position:fixed;top:0;right:-580px;width:560px;max-width:95vw;height:100%;background:#fff;z-index:50;box-shadow:-20px 0 60px rgba(0,0,0,.25);transition:right .32s cubic-bezier(.2,.8,.2,1);overflow-y:auto}
#panel.on{right:0}
.ph{padding:22px 24px;color:#fff;position:relative}
.ph .x{position:absolute;top:16px;right:18px;background:rgba(255,255,255,.2);border:0;color:#fff;width:32px;height:32px;border-radius:50%;font-size:17px;cursor:pointer}
.ph .nm{font-size:21px;font-weight:700}.ph .tt{opacity:.92;font-size:14px;margin-top:2px}
.ph .meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.chip{font-size:11.5px;background:rgba(255,255,255,.18);padding:4px 10px;border-radius:20px}
.pb{padding:18px 24px}
.kgroup{margin-bottom:18px}.kgroup h4{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin-bottom:9px;font-weight:700}
.kpi{border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:9px;padding:10px 12px;margin-bottom:8px}
.kpi .k{font-size:13.5px;font-weight:600}.kpi .t{font-size:12px;color:#1e8a4c;font-weight:600;margin-top:2px}
.kpi.contrib{border-left-color:#9aa8c7}
.jdbox{background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:13px 14px;font-size:13.5px;line-height:1.5;color:#2c3850}
.prev{font-size:12.5px;color:var(--mut);line-height:1.5}
.why{font-size:13px;line-height:1.5;background:#fff8ec;border:1px solid #f0e0bf;border-radius:10px;padding:12px 13px;color:#6b5320}
.note{font-size:12px;color:#9a6b1a;background:#fff5e2;border-radius:8px;padding:8px 11px;margin-top:8px}
.resp{margin:0 0 0 2px;padding-left:18px}.resp li{font-size:13px;line-height:1.5;margin-bottom:4px;color:#2c3850}
.rolechip{display:inline-block;font-size:11px;font-weight:700;color:#2E5496;background:#eef3ff;border-radius:20px;padding:4px 11px;margin-bottom:14px}
.holder{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid #f1f4f9;cursor:pointer}
.holder .av{width:30px;height:30px;font-size:12px}.holder:hover .nm2{color:var(--blue)}
.nm2{font-size:13.5px;font-weight:600}.holder small{color:var(--mut)}
#toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--navy);color:#fff;padding:11px 18px;border-radius:30px;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.25);display:flex;gap:9px;align-items:center;animation:rise .4s both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.foot{max-width:1240px;margin:0 auto 30px;padding:0 20px;font-size:11.5px;color:#9aa3b2}


/* ---- collapsible org chart ---- */
.hscroll{overflow-x:auto;overflow-y:hidden;padding:6px 4px 18px}
.otree{--lc:#cbd5e8;display:inline-block;min-width:100%;text-align:center;padding-top:4px}
.otree ul{position:relative;padding-top:24px;display:flex;justify-content:center;margin:0;list-style:none}
.otree li{position:relative;padding:24px 10px 0;display:flex;flex-direction:column;align-items:center}
.otree li::before,.otree li::after{content:'';position:absolute;top:0;right:50%;border-top:2px solid var(--lc);width:50%;height:24px}
.otree li::after{right:auto;left:50%;border-left:2px solid var(--lc)}
.otree li:only-child::before,.otree li:only-child::after{display:none}
.otree li:first-child::before,.otree li:last-child::after{border:0 none}
.otree li:last-child::before{border-right:2px solid var(--lc);border-radius:0 8px 0 0}
.otree li:first-child::after{border-radius:8px 0 0 0}
.otree ul ul::before{content:'';position:absolute;top:0;left:50%;border-left:2px solid var(--lc);height:24px}
.otree>ul{padding-top:0}.otree>ul>li::before,.otree>ul>li::after{display:none}
.ncard{display:inline-block;width:190px;background:#fff;border:1px solid var(--line);border-radius:9px;overflow:hidden;box-shadow:0 2px 8px rgba(20,40,80,.08);cursor:pointer;transition:.13s;vertical-align:top}
.ncard:hover{box-shadow:0 9px 22px rgba(31,56,100,.16);transform:translateY(-2px)}
.ncard .nh{padding:8px 11px;color:#3a4453;font-size:11.5px;font-weight:700;line-height:1.22;min-height:34px;display:flex;align-items:center;text-align:left}
.ncard .nb{padding:8px 11px;display:flex;justify-content:space-between;align-items:center;gap:6px;text-align:left}
.ncard .nm2{font-size:12.5px;font-weight:700;color:var(--ink)}
.ncard .nb .i{flex:0 0 auto;color:#94a3bd;font-size:10px;border:1px solid #cfd8e6;border-radius:50%;width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-style:italic;font-weight:700}
.ncard .nb .i:hover{background:#eef3ff;color:var(--blue)}
.ncard .nb .cntp{flex:0 0 auto;font-size:11px;font-weight:700;color:#fff;background:var(--blue);border-radius:12px;padding:2px 9px}
.ncard .ntog{border-top:1px solid var(--line);background:#f7f9ff;padding:5px 11px;font-size:10.5px;font-weight:700;color:var(--blue);text-align:left}
.ncard .ntog:hover{background:#e9f0ff}
.vstack{position:relative;display:inline-block;text-align:left;margin-top:18px}
.vstack::before{content:'';position:absolute;left:20px;top:-18px;bottom:24px;border-left:2px solid var(--lc)}
.vstack .ncard{display:block;width:214px;margin:9px 0 9px 40px;position:relative}
.vstack .ncard::before{content:'';position:absolute;left:-20px;top:24px;width:20px;border-top:2px solid var(--lc)}
.chtoolbar{display:flex;gap:8px;margin:0 0 10px}
/* ---- quipper journey ---- */
.journey{display:flex;overflow-x:auto;padding:4px 2px 14px;margin-bottom:4px}
.jstep{min-width:240px;max-width:262px;flex:0 0 auto;background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px;margin-right:30px;position:relative}
.jstep::after{content:'→';position:absolute;right:-24px;top:46%;color:#9aa8c7;font-size:22px;font-weight:700}
.jstep:last-child{margin-right:0}.jstep:last-child::after{display:none}
.jnum{width:27px;height:27px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin-bottom:9px}
.jstep h5{font-size:13.5px;color:var(--navy);line-height:1.2}.jstep p{font-size:11.5px;color:var(--mut);margin:6px 0 9px;line-height:1.5}
.jlab{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#9aa8c7;font-weight:700;margin:7px 0 4px}
.jdept{display:flex;flex-wrap:wrap;gap:5px}
.dchip{font-size:10.5px;font-weight:700;border-radius:14px;padding:3px 10px;cursor:pointer;color:#fff;border:0}
.dchip.sup{background:#eef3ff;color:var(--blue);font-weight:600}
.alwon{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 20px}
/* ---- points HUD + guide ---- */
.pts{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;color:#9a6b1a;background:#fff6e3;border:1px solid #f0e0bf;border-radius:20px;padding:4px 11px;white-space:nowrap}
.gbtn{border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 12px;font-size:12.5px;font-weight:600;color:var(--navy);cursor:pointer;white-space:nowrap}
.gbtn:hover{background:#f3f7ff}
.grules{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
.grules td{padding:7px 8px;border-bottom:1px solid #f1f4f9}.grules td:last-child{text-align:right;font-weight:700;color:#1e8a4c}
.badge{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f1f4f9}
.badge .bi{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;background:#eef2f8;flex:0 0 auto}
.badge.on .bi{background:#e8f7ee}.badge .bt b{font-size:13px}.badge .bt span{font-size:11.5px;color:var(--mut)}
.badge .bs{margin-left:auto;font-size:11px;font-weight:700;color:#9aa8c7}.badge.on .bs{color:#1e8a4c}
.gcard{background:#f7f9fc;border:1px solid var(--line);border-radius:11px;padding:12px 13px;margin-bottom:10px;font-size:13px;line-height:1.5}.gcard b{color:var(--navy)}

/* ===== pastel grid + journey + shared ===== */
.hero{color:#fff;border-radius:16px;padding:20px 22px;margin-bottom:16px}
.hero h2{font-size:18px;margin:0 0 6px;font-weight:800}.hero p{font-size:13px;opacity:.95;line-height:1.55;margin:0;max-width:900px}
.jhero{background:linear-gradient(120deg,#46506e,#5a6aa0)}
.sec-title{font-size:13.5px;font-weight:800;color:var(--navy);margin:16px 0 11px}
.crumbs{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--mut);margin-bottom:13px;flex-wrap:wrap}
.crumbs button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 11px;font-size:12.5px;cursor:pointer;color:var(--blue);font-weight:600}
.crumbs button:hover{background:#f3f7ff}.crumbs .sep{color:#c2cbdb}.crumbs b{font-weight:800}.crumbs .chint{color:#9aa8c7}
.ceobanner{display:flex;align-items:center;gap:14px;background:linear-gradient(120deg,#eef1f9,#f7f9fd);border:1px solid var(--line);border-radius:15px;padding:15px 18px;margin-bottom:15px}
.ceobanner .cbi{width:44px;height:44px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:21px;color:#caa23a;flex:0 0 auto}
.ceobanner .cbt{font-size:15px;font-weight:800;color:var(--navy)}.ceobanner .cbs{font-size:12px;color:var(--mut);margin-top:1px}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:14px;margin-bottom:6px}
.dcard{background:#fff;border:1px solid var(--line);border-radius:15px;overflow:hidden;cursor:pointer;transition:transform .14s,box-shadow .14s;display:flex;flex-direction:column}
.dcard:hover{transform:translateY(-3px);box-shadow:0 13px 28px rgba(31,56,100,.13)}
.dcard .dch{display:flex;align-items:center;gap:10px;padding:13px 15px;background:var(--bg)}
.dcard .dico{width:32px;height:32px;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:inset 0 0 0 2px var(--ac);flex:0 0 auto}
.dcard .dnm{font-size:13.5px;font-weight:800;color:#37414f;line-height:1.16}
.dcard .dbd{padding:13px 15px;flex:1}
.dcard .dhead{font-size:13px;font-weight:700;color:var(--ink)}
.dcard .dmeta{display:flex;align-items:center;gap:9px;margin-top:9px}
.dcard .dpill{font-size:11px;font-weight:700;color:#fff;background:var(--ac);border-radius:20px;padding:2px 11px}
.dcard .dteams{font-size:11.5px;color:var(--mut)}
.dcard .dgo{padding:9px 15px;border-top:1px solid var(--line);font-size:11.5px;font-weight:800;color:var(--ac);background:#fcfdff}
.bars{display:flex;flex-direction:column;gap:7px;margin:4px 0 18px}
.barrow{display:flex;align-items:center;gap:11px}.barrow .bn{width:200px;font-size:12px;color:var(--ink);font-weight:600;flex:0 0 auto}
.barrow .bar2{flex:1;height:13px;background:#eef2f8;border-radius:8px;overflow:hidden}.barrow .bar2 i{display:block;height:100%;border-radius:8px}
.barrow .bv{width:30px;text-align:right;font-size:12px;font-weight:700;color:var(--navy)}
.jproof{margin-top:11px;font-size:11px;color:#5a6573;border-top:1px dashed var(--line);padding-top:8px}.jproof b{color:var(--navy)}
.jdept{align-items:center}.jdept .arrow{color:#9aa8c7;font-weight:800;margin:0 3px}.jdept .plus{color:#9aa8c7;font-weight:700;margin:0 2px}
.playgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:15px;margin-bottom:18px}
.pcard{background:#fff;border:1px solid var(--line);border-top:4px solid var(--ac);border-radius:15px;overflow:hidden;display:flex;flex-direction:column}
.pcard .pch{display:flex;gap:12px;padding:14px 16px;background:var(--bg)}
.pcard .pico{width:36px;height:36px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto;box-shadow:inset 0 0 0 2px var(--ac)}
.pcard .pnm{font-size:14px;font-weight:800;color:#37414f}
.pcard .pmis{font-size:12px;color:#5a6573;margin-top:2px;line-height:1.42}
.pcard .pbd{padding:14px 16px}
.pcard .plab{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#9aa8c7;font-weight:700;margin:0 0 7px}
.pcard .pkpis{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.pcard .pkpi{font-size:11px;font-weight:700;color:#46535f;background:var(--bg);border:1px solid rgba(0,0,0,.05);border-radius:14px;padding:3px 10px}
.pcard .pcv{font-size:12.5px;color:#48535f;line-height:1.5;margin:0}
.closing{background:#fbfaf4;border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.55;color:#3a4656;margin-bottom:18px}.closing b{color:var(--navy)}

/* ===== grouped department chart ===== */
.dchart{padding:2px}
.dbanner{display:flex;align-items:center;gap:11px;background:var(--bg);border:1px solid var(--line);border-left:5px solid var(--ac);border-radius:13px;padding:13px 16px;margin-bottom:14px}
.dbanner .dbi{font-size:19px}.dbanner .dbt{font-size:15px;font-weight:800;color:#37414f}.dbanner .dbs{font-size:12.5px;color:var(--mut);margin-left:auto}
.dheadrow{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.tsection{margin-bottom:18px}
.tsec-h{font-size:13px;font-weight:800;color:var(--navy);margin:0 0 6px;display:flex;align-items:center;gap:8px}
.tsec-h .tsc{font-size:11px;font-weight:700;color:#fff;background:#aab4c8;border-radius:20px;padding:1px 9px}
.tsec-h .tdot{width:11px;height:11px;border-radius:50%;display:inline-block;flex:0 0 auto}
.tmgr{font-size:12px;color:#4a5563;margin:0 0 11px;background:#f7f9fc;border:1px solid var(--line);border-radius:9px;padding:8px 11px}
.tmgr span{cursor:pointer}.tmgr b{color:var(--navy)}.tmgr span:hover b{color:var(--blue)}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.gcard3{background:#fff;border:1px solid var(--line);border-top:3px solid var(--ac);border-radius:13px;overflow:hidden;display:flex;flex-direction:column}
.gcard3.head{min-width:230px}
.gcard3 .gh{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--bg);font-size:12.5px;font-weight:800;color:#37414f}
.gcard3 .gh .gc{margin-left:auto;font-size:10.5px;font-weight:700;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:20px;padding:1px 9px}
.gcard3 .gled{padding:9px 13px;font-size:12px;color:#3a4656;cursor:pointer;border-top:1px solid #f2f5fa}
.gcard3 .gled:hover{background:#f7faff}.gcard3 .gled b{color:var(--navy)}.gcard3 .gled .hatt{color:#9aa8c7;font-weight:600}
.gcard3 .gmembers{display:flex;flex-direction:column;border-top:1px solid #f2f5fa}

function _hx(h){h=h.replace('#','');return [parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)];}

function shade(h,r){return _mix(h,'#222a36',r);}

function _rgb2hsl(hex){let [r,g,b]=_hx(hex).map(v=>v/255);const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,sl,l=(mx+mn)/2;if(mx==mn){h=sl=0;}else{const d=mx-mn;sl=l>0.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}h/=6;}return [h*360,sl,l];}

function confetti(){for(let i=0;i<90;i++){const s=document.createElement('div');s.style.cssText=`position:fixed;top:-10px;left:${Math.random()*100}vw;width:8px;height:8px;background:hsl(${Math.random()*360},80%,60%);z-index:80;border-radius:2px;pointer-events:none`;document.body.appendChild(s);const d=2200+Math.random()*1500;s.animate([{transform:'translateY(0)',opacity:1},{transform:`translateY(102vh) rotate(${720*Math.random()}deg)`,opacity:.9}],{duration:d});setTimeout(()=>s.remove(),d);}}

let chartDept=null;
function flagOf(p){return p.country==='ID'?'🇮🇩':(p.country==='—'||!p.country)?'':'🇵🇭';}
function shortName(s){return (s||'').split(' (')[0];}
function attr(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function reportsOf(p,dept){return P().filter(q=>q.parent===p.name&&q.dept===dept);}
function isMgrIn(name,dept){return P().some(q=>q.parent===name&&q.dept===dept);}
function deptApex(d){const names=new Set(P().filter(p=>p.dept===d).map(p=>p.name));return P().filter(p=>p.dept===d&&!names.has(p.parent));}
function ncardP(p,dept,nrep,open){const ac=DCOLOR[dept]||'#2E5496';
  return `<div class="ncard" data-person="${attr(p.name)}"><div class="nh" style="background:${DBG[dept]||'#eef2f8'};border-left:4px solid ${ac}">${escapeH(p.title)} ${flagOf(p)}</div><div class="nb"><span class="nm2">${escapeH(p.name)}</span><span class="i" data-person="${attr(p.name)}" title="Open profile">i</span></div>${nrep?`<div class="ntog" data-toggle="${attr(p.name)}">${open?'▾ hide':'▸ show'} ${nrep} report${nrep>1?'s':''}</div>`:''}</div>`;}
function vstack(list,dept){return `<div class="vstack">${list.map(p=>ncardP(p,dept,0,false)).join('')}</div>`;}
function node(p,dept){const reps=reportsOf(p,dept);const open=state.cexp&&state.cexp.has(p.name);
  const mgr=reps.filter(r=>isMgrIn(r.name,dept));const ic=reps.filter(r=>!isMgrIn(r.name,dept));
  let h=`<li>${ncardP(p,dept,reps.length,open)}`;
  if(open){if(ic.length)h+=vstack(ic,dept);if(mgr.length)h+=`<ul>${mgr.map(m=>node(m,dept)).join('')}</ul>`;}
  return h+'</li>';}
function repCountIn(name,d){return P().filter(p=>p.parent===name&&p.dept===d).length;}
function groupLead(list,d){return list.slice().sort((a,b)=>repCountIn(b.name,d)-repCountIn(a.name,d))[0];}
function memberRow(p){return `<div class="grow" data-person="${attr(p.name)}"><span class="gnm">${escapeH(p.name)}</span><span class="gtt">${escapeH(p.title)} ${flagOf(p)}</span><span class="i" data-person="${attr(p.name)}">i</span></div>`;}
function groupLeadRes(raw,d){const inLead=raw.slice().sort((a,b)=>repCountIn(b.name,d)-repCountIn(a.name,d))[0];
  if(inLead&&repCountIn(inLead.name,d)>0)return{lead:inLead,external:false};
  const names=new Set(raw.map(p=>p.name));const cnt={};
  raw.forEach(p=>{if(p.parent&&!names.has(p.parent))cnt[p.parent]=(cnt[p.parent]||0)+1;});
  let best=null,bn=0;for(const k in cnt)if(cnt[k]>bn){best=k;bn=cnt[k];}
  if(best){const mgr=P().find(x=>x.name===best);if(mgr)return{lead:mgr,external:true};}
  return{lead:inLead,external:false};}
function groupCard(d,label,raw,accent){const ac=accent||DCOLOR[d];const bg=tint(ac,0.86);const apexN=new Set(deptApex(d).map(p=>p.name));
  const res=groupLeadRes(raw,d);const lead=res.lead;const leadIsApex=apexN.has(lead.name);
  const members=raw.filter(p=>!apexN.has(p.name)&&p.name!==lead.name);
  const key=d+'|'+label;const open=state.gexp&&state.gexp.has(key);
  const tag=res.external?'Managed by':'Lead';
  const extra=res.external?` <span class="hatt">(${escapeH(lead.title)})</span>`:(' · '+escapeH(lead.title)+(leadIsApex?' <span class="hatt">(also dept head)</span>':''));
  const leadLine=`<div class="gled" data-person="${attr(lead.name)}">★ ${tag}: <b>${escapeH(lead.name)}</b>${extra}</div>`;
  const body=members.length?`<div class="gmembers ${open?'':'hidden'}">${members.map(memberRow).join('')}</div><div class="gtog" data-gtog="${attr(key)}">${open?'▾ hide members':'▸ show '+members.length+' member'+(members.length>1?'s':'')}</div>`:'';
  return `<div class="gcard3" style="--ac:${ac};--bg:${bg}"><div class="gh">${escapeH(label)}<span class="gc">${raw.length}</span></div>${leadLine}${body}</div>`;}
function teamSection(d,team){const tp=P().filter(p=>p.dept===d&&p.team===team);const apexN=new Set(deptApex(d).map(p=>p.name));
  const acc=teamAccent(d,team);
  const areas=[...new Set(tp.map(p=>p.area).filter(Boolean))].sort((a,b)=>(AREA_ORDER.indexOf(a)+1||99)-(AREA_ORDER.indexOf(b)+1||99));
  if(areas.length>1){
    const noArea=tp.filter(p=>!p.area&&!apexN.has(p.name));
    const mgrLine=noArea.length?`<div class="tmgr" style="border-left:4px solid ${acc}">Team manager: ${noArea.map(p=>`<span data-person="${attr(p.name)}"><b>${escapeH(p.name)}</b> · ${escapeH(p.title)}</span>`).join(' · ')} — the area leads below report here.</div>`:'';
    const cards=areas.map((a,ai)=>groupCard(d,a,tp.filter(p=>p.area===a),areaTint(acc,ai,areas.length))).join('');
    return `<div class="tsection"><div class="tsec-h" style="color:${shade(acc,0.34)}"><span class="tdot" style="background:${acc}"></span>${escapeH(team)} <span class="tsc" style="background:${acc}">${tp.length}</span></div>${mgrLine}<div class="ggrid">${cards}</div></div>`;
  }
  if(tp.every(p=>apexN.has(p.name)))return '';
  return `<div class="tsection"><div class="tsec-h" style="color:${shade(acc,0.34)}"><span class="tdot" style="background:${acc}"></span>${escapeH(team)} <span class="tsc" style="background:${acc}">${tp.length}</span></div><div class="ggrid">${groupCard(d,team,tp,acc)}</div></div>`;}
function allGroupKeys(d){const keys=[];const apexN=new Set(deptApex(d).map(p=>p.name));teamsOf(d).forEach(t=>{const tp=P().filter(p=>p.dept===d&&p.team===t);const areas=[...new Set(tp.map(p=>p.area).filter(Boolean))];if(areas.length>1){areas.forEach(a=>keys.push(d+'|'+a));}else if(!tp.every(p=>apexN.has(p.name))){keys.push(d+'|'+t);}});return keys;}
function deptChart(d){const heads=deptApex(d);
  const headCards=heads.map(h=>`<div class="gcard3 head" style="--ac:${DCOLOR[d]};--bg:${DBG[d]}"><div class="gh">${escapeH(h.title)} ${flagOf(h)}<span class="gc">Head</span></div><div class="gled" data-person="${attr(h.name)}"><b>${escapeH(h.name)}</b></div></div>`).join('');
  const sections=teamsOf(d).map(t=>teamSection(d,t)).join('');
  return `<div class="dchart"><div class="dbanner" style="--ac:${DCOLOR[d]};--bg:${DBG[d]}"><span class="dbi">${DICON[d]||''}</span><span class="dbt">${escapeH(d)}</span><span class="dbs">${deptCount(d)} people · ${teamsOf(d).length} teams</span></div><div class="dheadrow">${headCards}</div>${sections}</div>`;}
function treeReports(p,d){return P().filter(q=>q.parent===p.name&&q.dept===d);}
function treeCard(p,d,nrep,open){const ac=teamAccent(d,p.team);return `<div class="ncard" data-person="${attr(p.name)}"><div class="nh" style="background:${tint(ac,0.85)};border-left:4px solid ${ac}">${escapeH(p.title)} ${flagOf(p)}</div><div class="nb"><span class="nm2">${escapeH(p.name)}</span><span class="i" data-person="${attr(p.name)}">i</span></div>${nrep?`<div class="ntog" data-ttog="${attr(p.name)}">${open?'▾ hide':'▸ show'} ${nrep} report${nrep>1?'s':''}</div>`:''}</div>`;}
function treeNode(p,d){const reps=treeReports(p,d);const open=state.texp&&state.texp.has(p.name);
  let h=`<li>${treeCard(p,d,reps.length,open)}`;
  if(open&&reps.length)h+=`<ul>${reps.map(r=>treeNode(r,d)).join('')}</ul>`;
  return h+'</li>';}
function deptTree(d){const apex=deptApex(d);return `<div class="otree"><ul>${apex.map(p=>treeNode(p,d)).join('')}</ul></div>`;}
function companyGrid(){const card=d=>`<div class="dcard" data-dept="${attr(d)}" style="--ac:${DCOLOR[d]};--bg:${DBG[d]}"><div class="dch"><span class="dico">${DICON[d]||''}</span><span class="dnm">${escapeH(d)}</span></div><div class="dbd"><div class="dhead">${escapeH(shortName(HEADS[d]||'\u2014'))}</div><div class="dmeta"><span class="dpill">${deptCount(d)} people</span><span class="dteams">${teamsOf(d).length} teams</span></div></div><div class="dgo">View team \u2192</div></div>`;
  return `<div class="ceobanner"><div class="cbi">\u2605</div><div><div class="cbt">David Soukhasing</div><div class="cbs">Chief Executive Officer \u00b7 ${M.deptOrder.length} departments report in</div></div></div><div class="cgrid">${M.deptOrder.map(card).join('')}</div>`;}

 const J=[

 t.innerHTML=`<div class="hero jhero"><h2>How Quipper serves a school — end to end</h2><p>Every school moves through seven moments, from first hello to renewal. Each moment has one clear owner and the teams that pitch in — plus a metric that proves it worked. Below, see how each department contributes to the same promise: schools that adopt, see results, and stay.</p></div>
  <div class="sec-title">🧭 The school lifecycle — who does what, and the proof</div><div class="journey">${steps}</div>
  <div class="sec-title">🎯 Every department’s part in the client promise</div><div class="playgrid">${pcards}</div>
  <div class="closing"><b>The thread that ties it together:</b> Revenue Operations keeps every team on one source of truth about each school, and the CEO Office / Business Operations keeps the eight departments moving on the same priorities — so nothing about a school falls through the cracks.</div>`;
 t.querySelectorAll('[data-dept]').forEach(el=>el.onclick=()=>{setView('chart');chartOpenDept(el.getAttribute('data-dept'));});
 award('journey','🧭','Read the Quipper Journey');gainOnce('journey',10);}

function deptStats(){const mx=Math.max(...M.deptOrder.map(d=>deptCount(d)));
  return `<div class="sec-title">Headcount by department</div><div class="bars">${M.deptOrder.map(d=>`<div class="barrow"><div class="bn">${DICON[d]||''} ${escapeH(d)}</div><div class="bar2"><i style="width:${deptCount(d)/mx*100}%;background:${DCOLOR[d]}"></i></div><div class="bv">${deptCount(d)}</div></div>`).join('')}</div>`;}
function bindPeople(root){root.querySelectorAll('[data-person]').forEach(el=>el.onclick=e=>{e.stopPropagation();openPersonByName(el.getAttribute('data-person'));});}
function paintDept(){if(!state.gexp)state.gexp=new Set();if(!state.texp)state.texp=new Set();const o=document.getElementById('ochart');
  if(state.chartMode==='tree'){o.innerHTML=`<div class="hscroll">${deptTree(chartDept)}</div>`;
    o.querySelectorAll('[data-ttog]').forEach(el=>el.onclick=e=>{e.stopPropagation();const n=el.getAttribute('data-ttog');if(state.texp.has(n))state.texp.delete(n);else state.texp.add(n);paintDept();});
  }else{o.innerHTML=deptChart(chartDept);
    o.querySelectorAll('[data-gtog]').forEach(el=>el.onclick=e=>{e.stopPropagation();const k=el.getAttribute('data-gtog');if(state.gexp.has(k))state.gexp.delete(k);else state.gexp.add(k);paintDept();});}
  bindPeople(o);}
function chartOpenDept(d){chartDept=d;state.gexp=new Set();state.texp=new Set(deptApex(d).map(p=>p.name));if(!state.chartMode)state.chartMode='grouped';renderChart();window.scrollTo({top:0,behavior:'smooth'});visitDept(d);award('chart','🗺️','Opened a department chart');gainOnce('c:'+d,10);}
function chartHome(){chartDept=null;renderChart();}
function qpExpandAll(){state.gexp=new Set(allGroupKeys(chartDept));paintDept();}
function qpCollapseAll(){state.gexp=new Set();paintDept();}
function setChartMode(m){state.chartMode=m;if(m==='tree'&&(!state.texp||!state.texp.size))state.texp=new Set(deptApex(chartDept).map(p=>p.name));renderChart();}
function qpTreeExpand(){state.texp=new Set(P().filter(p=>p.dept===chartDept).map(p=>p.name));paintDept();}
function qpTreeCollapse(){state.texp=new Set(deptApex(chartDept).map(p=>p.name));paintDept();}
function renderChart(){const t=document.getElementById('tree');
  if(!chartDept){t.innerHTML=`<div class="sec-title">🗺️ Company org chart — pick a department to open its reporting tree</div>${companyGrid()}`+deptStats();
    t.querySelectorAll('[data-dept]').forEach(el=>el.onclick=()=>chartOpenDept(el.getAttribute('data-dept')));bindPeople(t);}
  else{const grouped=state.chartMode!=='tree';
    const modeTabs=`<div class="modetabs"><button class="mtab ${grouped?'on':''}" onclick="setChartMode('grouped')">▦ Grouped by team / area</button><button class="mtab ${grouped?'':'on'}" onclick="setChartMode('tree')">↳ Reporting tree</button></div>`;
    const tools=grouped?`<button class="tbtn" onclick="qpExpandAll()">⤢ Expand all</button><button class="tbtn" onclick="qpCollapseAll()">⤡ Collapse</button>`:`<button class="tbtn" onclick="qpTreeExpand()">⤢ Expand all</button><button class="tbtn" onclick="qpTreeCollapse()">⤡ Collapse</button>`;
    const hint=grouped?'grouped by team & area · click a name for JD/KPIs · ▸ shows members':'top-down reporting lines — who reports to whom · ▸ expands a branch';
    t.innerHTML=`<div class="crumbs"><button onclick="chartHome()">← All departments</button><span class="sep">›</span><b style="color:${DDEEP[chartDept]}">${DICON[chartDept]||''} ${escapeH(chartDept)}</b><span class="chint">${hint}</span></div>
    ${modeTabs}<div class="chtoolbar">${tools}</div><div id="ochart"></div>`;paintDept();}}

// ---- points + guide ----
function addPoints(n){state.points=(state.points||0)+n;const e=document.getElementById('pts');if(e)e.textContent=state.points;const lv=document.getElementById('lvl');if(lv)lv.textContent=Math.max(1,Math.min(25,1+Math.floor(state.points/40)));}
function gainOnce(key,n){state._g=state._g||new Set();if(state._g.has(key))return;state._g.add(key);addPoints(n);}
function initPts(){const e=document.getElementById('pts');if(e)e.textContent=state.points||0;}
function maybeGuide(){try{if(!localStorage.getItem('qg')){localStorage.setItem('qg','1');setTimeout(openGuide,500);}}catch(e){}}
const BADGES=[['frontline','🎯','Role Profiler','Open any person for their JD & KPIs'],['rolelib','📚','Librarian','Open a role in the Roles tab'],['chart','🗺️','Cartographer','Open a department in the Org Chart tab'],['search','🔍','Detective','Use the search bar'],['explorer','🏆','Org Explorer','Open all 9 departments']];
function openGuide(){const a=state._a||new Set();const pan=document.getElementById('panel');
  pan.innerHTML=`<div class="ph" style="background:linear-gradient(120deg,#1F3864,#33508a)"><button class="x" onclick="closePanel()">×</button><div class="nm">🎮 How to explore Quipper</div><div class="tt">Three ways to see the org — and earn points doing it.</div></div>
  <div class="pb">
   <div class="kgroup"><h4>The three tabs</h4>
     <div class="gcard"><b>🌳 Organization</b> — a branching tree. Click a branch to expand: department → team → area → manager → person.</div>
     <div class="gcard"><b>📚 Roles · JD &amp; KPI</b> — the role library. Open any role to read its purpose, responsibilities and KPIs, and see who holds it.</div>
     <div class="gcard"><b>🗺️ Org Chart</b> — the visual top-down chart plus the Quipper Journey showing how every team works together end to end.</div></div>
   <div class="kgroup"><h4>⭐ How to earn points</h4>
     <table class="grules"><tr><td>Open a department</td><td>+10</td></tr><tr><td>Open a person's profile</td><td>+3</td></tr><tr><td>Open a role in the library</td><td>+3</td></tr><tr><td>Use search</td><td>+5</td></tr><tr><td>Earn a badge</td><td>+15</td></tr><tr><td>Open all 9 departments</td><td>+50 🎉</td></tr></table>
     <div class="note">Every 40 points = +1 Explorer Level. You're at <b>${state.points||0}</b> points.</div></div>
   <div class="kgroup"><h4>🏅 Badges</h4>${BADGES.map(b=>`<div class="badge ${a.has(b[0])?'on':''}"><div class="bi">${b[1]}</div><div class="bt"><b>${b[2]}</b><br><span>${b[3]}</span></div><div class="bs">${a.has(b[0])?'EARNED':'locked'}</div></div>`).join('')}</div>
   <div class="kgroup"><h4>💡 Tips</h4><div class="gcard">Use the <b>search bar</b> to jump to anyone or any role instantly. The little <b>ⓘ</b> on a chart box opens that person's full profile. Open all departments to trigger the 🏆 confetti.</div></div>
  </div>`;openPan();}

document.getElementById('gbtn').onclick=unlock;
document.getElementById('gpw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});
document.addEventListener('input',e=>{if(e.target.id==='q')doSearch();});
document.addEventListener('click',e=>{if(!e.target.closest('.search'))sres().classList.add('hidden');});
(async()=>{await loadData();document.getElementById('gpw').focus();})();
</script></body></html>
