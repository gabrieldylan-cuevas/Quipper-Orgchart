<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Quipper PH — Org Explorer</title>
  <style>
    :root {
      --navy: #1F3864;
      --blue: #2E5496;
      --ink: #1b2330;
      --mut: #6b7686;
      --line: #e7ebf2;
      --bg: #eef2f8;
      --card: #fff;
      --gold: #E0A02C;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, Arial, sans-serif; background: var(--bg); color: var(--ink); }
    .hidden { display: none !important; }

    /* ---- Login Gate ---- */
    #gate { position: fixed; inset: 0; background: linear-gradient(135deg, #16233f, #2E5496); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .gate-card { background: #fff; border-radius: 16px; padding: 38px 34px; width: 344px; text-align: center; box-shadow: 0 30px 70px rgba(0, 0, 0, .35); }
    .gate-card h1 { font-size: 20px; color: var(--navy); margin-bottom: 6px; }
    .gate-card p { font-size: 13px; color: var(--mut); margin-bottom: 18px; }
    .gate-card input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--line); border-radius: 10px; font-size: 15px; margin-bottom: 12px; }
    .gate-card button { width: 100%; padding: 12px; border: 0; border-radius: 10px; background: var(--navy); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
    .gate-card button:disabled { opacity: 0.7; cursor: not-allowed; }
    .gate-err { color: #c0392b; font-size: 12.5px; height: 16px; margin-bottom: 6px; }

    /* ---- Header & Navigation ---- */
    header { position: sticky; top: 0; z-index: 30; background: rgba(255, 255, 255, .95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); }
    .hwrap { max-width: 1240px; margin: 0 auto; padding: 10px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .logo { font-weight: 800; color: var(--navy); font-size: 16px; cursor: pointer; white-space: nowrap; }
    .logo span { color: var(--gold); }
    
    .tabs { display: flex; gap: 6px; background: #eef2f8; border-radius: 10px; padding: 4px; overflow-x: auto; flex: 1; }
    .tabs button { border: 0; background: none; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--mut); cursor: pointer; white-space: nowrap; }
    .tabs button.on { background: #fff; color: var(--navy); box-shadow: 0 1px 4px rgba(0, 0, 0, .08); }

    .live { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: #eef3ff; color: var(--blue); font-weight: 600; margin-left: auto; }
    .live.on { background: #e8f7ee; color: #1e8a4c; }

    main { max-width: 1240px; margin: 0 auto; padding: 18px 20px 60px; }
    
    .toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
    .toolbar .hint { font-size: 12.5px; color: var(--mut); }
    .tbtn { border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 6px 12px; font-size: 12.5px; cursor: pointer; color: var(--blue); font-weight: 600; }
    .tbtn:hover { background: #f3f7ff; }

    /* ---- Profile Card View (Landing) ---- */
    #landingView { max-width: 860px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12); overflow: hidden; border: 1px solid var(--line); }
    
    .ph { padding: 22px 24px; color: #fff; position: relative; }
    .ph .nm { font-size: 21px; font-weight: 700; }
    .ph .tt { opacity: .92; font-size: 14px; margin-top: 2px; }
    .ph .meta { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 12px; }
    .chip { font-size: 11.5px; background: rgba(255, 255, 255, .18); padding: 4px 10px; border-radius: 20px; }
    .pb { padding: 18px 24px; }
    .kgroup { margin-bottom: 18px; }
    .kgroup h4 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--mut); margin-bottom: 9px; font-weight: 700; }
    .kpi { border: 1px solid var(--line); border-left: 4px solid var(--blue); border-radius: 9px; padding: 10px 12px; margin-bottom: 8px; }
    .kpi .k { font-size: 13.5px; font-weight: 600; }
    .kpi .t { font-size: 12px; color: #1e8a4c; font-weight: 600; margin-top: 2px; }
    .kpi.contrib { border-left-color: #9aa8c7; }
    .jdbox { background: #f7f9fc; border: 1px solid var(--line); border-radius: 10px; padding: 13px 14px; font-size: 13.5px; line-height: 1.5; color: #2c3850; }
    .prev { font-size: 12.5px; color: var(--mut); line-height: 1.5; }
    .why { font-size: 13px; line-height: 1.5; background: #fff8ec; border: 1px solid #f0e0bf; border-radius: 10px; padding: 12px 13px; color: #6b5320; }
    .note { font-size: 12px; color: #9a6b1a; background: #fff5e2; border-radius: 8px; padding: 8px 11px; margin-top: 8px; }
    .resp { margin: 0 0 0 2px; padding-left: 18px; }
    .resp li { font-size: 13px; line-height: 1.5; margin-bottom: 4px; color: #2c3850; }
    .rolechip { display: inline-block; font-size: 11px; font-weight: 700; color: #2E5496; background: #eef3ff; border-radius: 20px; padding: 4px 11px; margin-bottom: 14px; }
    .jdlink { display: inline-flex; align-items: center; gap: 6px; text-decoration: none; background: #1e8a4c; color: #fff; font-weight: 700; font-size: 12.5px; padding: 8px 13px; border-radius: 9px; margin-bottom: 14px; }
    .jdlink:hover { background: #17713e; }
    .jdsoon { font-size: 11.5px; color: #9aa8c7; background: #f7f9fc; border: 1px dashed var(--line); border-radius: 9px; padding: 7px 11px; margin-bottom: 14px; }

    /* ---- Organization Tree ---- */
    .tree { margin-top: 4px; }
    .kids { margin-left: 20px; padding-left: 16px; border-left: 2px solid #dde4ef; overflow: hidden; transition: opacity .2s; }
    .node { margin: 7px 0; animation: fade .25s both; }
    .nrow { display: flex; align-items: center; gap: 11px; background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 11px 13px; cursor: pointer; transition: transform .15s, box-shadow .15s, border-color .15s; position: relative; }
    .nrow:hover { transform: translateX(2px); box-shadow: 0 6px 18px rgba(31, 56, 100, .10); border-color: #cdd8ea; }
    .nrow .rail { width: 5px; align-self: stretch; border-radius: 5px; flex-shrink: 0; }
    .nrow .chev { width: 18px; text-align: center; color: var(--mut); font-size: 12px; transition: transform .2s; flex-shrink: 0; }
    .nrow.open .chev { transform: rotate(90deg); }
    .nrow .av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-size: 13px; flex-shrink: 0; }
    .nrow .body { flex: 1; min-width: 0; }
    .nrow .lab { font-size: 14.5px; font-weight: 650; line-height: 1.18; color: var(--ink); }
    .nrow .sub { font-size: 12px; color: var(--mut); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nrow .cnt { font-size: 11.5px; font-weight: 700; color: #fff; background: var(--blue); border-radius: 20px; padding: 3px 10px; flex-shrink: 0; }
    .nrow .tag { font-size: 10.5px; font-weight: 700; border-radius: 20px; padding: 3px 9px; flex-shrink: 0; }
    .tag.lead { background: #fff4e0; color: #9a6b1a; }
    .leaf .lab { font-weight: 600; }
    @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
    .rootcard { background: linear-gradient(120deg, var(--navy), #33508a); color: #fff; border: 0; }
    .rootcard .lab, .rootcard .sub { color: #fff; }
    .rootcard .sub { opacity: .85; }
    
    .foot { max-width: 1240px; margin: 0 auto 30px; padding: 0 20px; font-size: 11.5px; color: #9aa3b2; text-align: center; }
  </style>
</head>

<body>
  <div id="gate">
    <div class="gate-card">
      <h1>Quipper PH · Org Explorer</h1>
      <p>Enter your credentials to access your profile and the directory.</p>
      <div class="gate-err" id="gerr"></div>
      <input id="gusr" type="text" placeholder="Employee ID" autocomplete="off">
      <input id="gpw" type="password" placeholder="Password" autocomplete="off">
      <button id="gbtn">Enter</button>
    </div>
  </div>

  <header class="hidden" id="hdr">
    <div class="hwrap">
      <div class="logo" onclick="resetView()">Quipper <span>PH</span> · Org</div>
      <div class="tabs">
        <button id="tabLanding" class="on" onclick="setView('landing')">👤 My Profile</button>
        <button id="tabOrg" onclick="setView('org')">🌳 Organization</button>
      </div>
      <div class="live on" id="livechip">● secure</div>
    </div>
  </header>

  <main class="hidden" id="app">
    <div class="toolbar" id="toolbar" style="display:none;">
      <button class="tbtn" onclick="expandTop()">⤢ Expand level</button>
      <button class="tbtn" onclick="collapseAll()">⤡ Collapse all</button>
      <span class="hint" id="hint"></span>
    </div>
    
    <div id="landingView"></div>
    <div class="tree hidden" id="tree"></div>
  </main>

  <div class="foot hidden" id="foot"></div>

  <script>
    // -------------------------------------------------------------------------
    // Config & Webhook
    // -------------------------------------------------------------------------
    const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbzKVdjulRRRYwZssUVu_-OqE4QqiyGIE0v6s4Yxv2g068JkIMijdzk2pqkZF7RZztcv/exec";

    const DCOLOR = { "CEO Office": "#5765A6", "Sales & Marketing": "#D9774E", "Customer Success": "#3E9E80", "Product & Content": "#9168BE", "Engineering": "#4E86C4", "Finance & Accounting": "#3F95A0", "Human Resource": "#CB6385", "Legal & Compliance": "#BE9442", "Revenue Operations": "#6373AE" };
    const DICON = { "CEO Office": "★", "Sales & Marketing": "📈", "Customer Success": "🤝", "Product & Content": "🧩", "Engineering": "⚙️", "Finance & Accounting": "💰", "Human Resource": "👥", "Legal & Compliance": "⚖️", "Revenue Operations": "📊" };
    const AREA_ORDER = ["North Luzon", "Central Luzon", "NCR", "CaLaBa", "Quezon-4B-Bicol", "Western Visayas", "Central + Eastern Visayas", "North Mindanao", "South Mindanao", "Distributor Sales", "Strategic Accounts", "HQ / Central"];
    const TEAM_ORDER = ["CEO", "Business Operations", "Sales", "Communication & Marketing", "Strategic Partnership & Alliances", "Implementation Team", "Customer Training", "Retention HQ", "Product", "Content", "Support", "Engineering Leadership", "Educator", "Learner / Mobile", "Data Intelligence", "CFO Office", "FP&A", "Accounts Receivable", "Accounts Payable", "Tax & Audit", "Talent Management", "Recruitment", "Culture & Engagement", "Business Continuity / OSH", "Legal Counsel & DPO", "CRM & Data Analytics", "Sales & Support Enablement"];
    const HEADS = { "Sales & Marketing": "Rainer Lester P. Rondero", "Customer Success": "Joel A. Zarate Jr.", "Product & Content": "Khanh (Kelsie) Nguyen", "Engineering": "Trieu Le", "Finance & Accounting": "Chloe Anne O. Natividad", "Human Resource": "Tolosa & Francisco (interim co-leads)", "Legal & Compliance": "Ma. Jessa M. Alvarez", "Revenue Operations": "Katrina Mae P. Miranda (interim)", "CEO Office": "David Soukhasing" };

    // -------------------------------------------------------------------------
    // Color Helpers
    // -------------------------------------------------------------------------
    function _hx(h) { h = h.replace('#', ''); return [parseInt(h.substr(0, 2), 16), parseInt(h.substr(2, 2), 16), parseInt(h.substr(4, 2), 16)]; }
    function _mix(h, t, r) { const a = _hx(h), b = _hx(t); return '#' + a.map((v, i) => Math.round(v + (b[i] - v) * r).toString(16).padStart(2, '0')).join(''); }
    function tint(h, r) { return _mix(h, '#ffffff', r); }
    function shade(h, r) { return _mix(h, '#222a36', r); }

    const DBG = {}, DDEEP = {};
    Object.keys(DCOLOR).forEach(d => { DBG[d] = tint(DCOLOR[d], 0.86); DDEEP[d] = shade(DCOLOR[d], 0.40); });

    let M = {}, view = 'landing', state = { currentUser: null };

    // -------------------------------------------------------------------------
    // Data Processor
    // -------------------------------------------------------------------------
    function buildFromSecureData(data) {
      const H = data[0];
      const ix = n => H.indexOf(n);

      const people = [];
      const library = {};
      const cz = v => (v === 0 ? '0' : (v || ''));

      for (let i = 1; i < data.length; i++) {
        const r = data[i];
        const g = n => cz(r[ix(n)]);

        if (!g('name')) continue;

        const a = g('archetype');

        people.push({
          empno: g('empno'), name: g('name'), status: g('status'), country: g('country'),
          dept: g('department'), team: g('team'), area: g('area'), archetype: a,
          title: g('title'), parent: g('reports_to'), prev_kpis: g('prev_kpis'), flag: g('flag')
        });

        if (!library[a]) {
          library[a] = {
            dept: g('department'),
            jd: g('jd'),
            jd_link: g('jd_link') || '',
            rationale: g('rationale'),
            resp: (g('responsibilities') || '').split(' | ').filter(Boolean),
            where: g('where'),
            direct: [
              [g('direct1'), g('target1')],
              [g('direct2'), g('target2')],
              [g('direct3'), g('target3')]
            ].filter(x => x[0]).map(x => ({ kpi: x[0], target: x[1] })),
            contrib: [g('contrib1'), g('contrib2'), g('contrib3')].filter(Boolean)
          };
        }
      }

      M = {
        deptOrder: ["CEO Office", "Sales & Marketing", "Customer Success", "Product & Content", "Engineering", "Finance & Accounting", "Human Resource", "Legal & Compliance", "Revenue Operations"],
        library: library,
        people: people
      };

      // Custom tree overrides
      const FIX = { "Marthonie A. Belleza": "Merry Chris Sabate", "Larene Gayle C. Quimpo": "Merry Chris Sabate", "Chino Ri S. Le": "Merry Chris Sabate" };
      M.people.forEach(p => { if (FIX[p.name]) p.parent = FIX[p.name]; });
    }

    // -------------------------------------------------------------------------
    // Helpers
    // -------------------------------------------------------------------------
    const P = () => M.people;
    function slc(f) { return P().filter(p => (!f.dept || p.dept === f.dept) && (!f.team || p.team === f.team) && (f.area === undefined || p.area === f.area) && (!f.parent || p.parent === f.parent)); }
    function teamsOf(d) { return [...new Set(slc({ dept: d }).map(p => p.team))].sort((a, b) => (TEAM_ORDER.indexOf(a) + 1 || 99) - (TEAM_ORDER.indexOf(b) + 1 || 99)); }
    function areasOf(d, t) { return [...new Set(slc({ dept: d, team: t }).map(p => p.area).filter(Boolean))].sort((a, b) => (AREA_ORDER.indexOf(a) + 1 || 99) - (AREA_ORDER.indexOf(b) + 1 || 99)); }
    function isAreaTeam(d, t) { return (d === "Sales & Marketing" && t === "Sales") || (d === "Customer Success" && t === "Implementation Team"); }
    function initials(n) { return n.split(/\s+/).filter(w => /[A-Za-z]/.test(w[0])).slice(0, 2).map(w => w[0]).join('').toUpperCase(); }
    function attr(s) { return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
    
    function teamLead(d, t) {
      const ppl = slc({ dept: d, team: t }); const names = new Set(ppl.map(p => p.name));
      const apex = ppl.filter(p => !names.has(p.parent));
      const withReports = apex.find(p => ppl.some(q => q.parent === p.name));
      return (withReports || apex[0] || ppl[0] || {}).name || '';
    }

    // -------------------------------------------------------------------------
    // ORG TREE MODEL
    // -------------------------------------------------------------------------
    function rootNode() {
      return {
        kind: 'root', label: 'David Soukhasing', sub: 'Chief Executive Officer · CEO Office', color: '#1F3864', count: M.people.length,
        children: () => {
          const kids = [];
          const biz = slc({ dept: 'CEO Office', team: 'Business Operations' });
          if (biz.length) kids.push(personNode(biz[0], 'CEO Office'));
          M.deptOrder.filter(d => d !== 'CEO Office').forEach(d => kids.push(deptNode(d)));
          return kids;
        }
      };
    }
    
    function deptNode(d) {
      return {
        kind: 'dept', label: d, sub: 'Led by ' + (HEADS[d] || teamLead(d, teamsOf(d)[0])), color: DCOLOR[d], count: slc({ dept: d }).length, icon: DICON[d],
        children: () => teamsOf(d).map(t => teamNode(d, t))
      };
    }
    
    function teamNode(d, t) {
      return {
        kind: 'team', label: t, sub: 'Lead: ' + (teamLead(d, t) || '—'), color: DCOLOR[d], count: slc({ dept: d, team: t }).length,
        children: () => isAreaTeam(d, t) ? areasOf(d, t).map(a => areaNode(d, t, a)).concat(slc({ dept: d, team: t }).filter(p => !p.area).map(p => personNode(p, d))) : peopleGroup({ dept: d, team: t }, d)
      };
    }
    
    function areaNode(d, t, a) {
      return {
        kind: 'area', label: '📍 ' + a, sub: slc({ dept: d, team: t, area: a }).length + ' in area', color: DCOLOR[d], count: slc({ dept: d, team: t, area: a }).length,
        children: () => peopleGroup({ dept: d, team: t, area: a }, d)
      };
    }
    
    function peopleGroup(f, d) {
      const ppl = slc(f); const mgrNames = new Set(ppl.map(p => p.parent).filter(n => ppl.some(q => q.name === n)));
      const out = [];
      ppl.filter(p => mgrNames.has(p.name)).forEach(m => out.push(managerNode(m, f, d)));
      ppl.filter(p => !mgrNames.has(p.name) && !mgrNames.has(p.parent)).forEach(p => out.push(personNode(p, d)));
      return out.length ? out : ppl.map(p => personNode(p, d));
    }
    
    function managerNode(m, f, d) {
      const reps = slc({ ...f, parent: m.name });
      return {
        kind: 'manager', person: m, label: m.name, sub: m.title, color: DCOLOR[d], count: reps.length, isPerson: true,
        children: () => reps.map(p => personNode(p, d))
      };
    }
    
    function personNode(p, d) { return { kind: 'person', person: p, label: p.name, sub: p.title, color: DCOLOR[d || p.dept], leaf: true }; }


    // -------------------------------------------------------------------------
    // RENDER: LANDING / PROFILE
    // -------------------------------------------------------------------------
    function respOf(lib) { if (Array.isArray(lib.resp)) return lib.resp; if (typeof lib.resp === 'string') return lib.resp.split(' | ').filter(Boolean); return []; }
    
    function kpiHTML(lib) {
      const dirs = (lib.direct || []).map(k => `<div class="kpi"><div class="k">${escapeH(k.kpi)}</div><div class="t">🎯 ${escapeH(k.target || '')}</div></div>`).join('');
      const con = (lib.contrib || []).map(k => `<div class="kpi contrib"><div class="k">${escapeH(k)}</div></div>`).join(''); return { dirs, con };
    }
    
    function specBody(lib) {
      const { dirs, con } = kpiHTML(lib); const resp = respOf(lib);
      const jdBtn = lib.jd_link ? `<a class="jdlink" href="${attr(lib.jd_link)}" target="_blank" rel="noopener">📄 Open full Job Description ↗</a>` : `<div class="jdsoon">📄 Full JD document — coming soon for this role</div>`;
      const respH = resp.length ? `<ul class="resp">${resp.map(r => `<li>${escapeH(r)}</li>`).join('')}</ul>` : '<div class="prev">—</div>';
      const blank = !(lib.direct && lib.direct.length);
      const kpiSection = blank ? `<div class="note">KPIs to be defined for this role.</div>`
        : `<div class="kgroup"><h4>🎯 Direct KPIs · owns &amp; judged on</h4>${dirs}</div>
           <div class="kgroup"><h4>🤝 Contributed KPIs · helps move</h4>${con || '<div class="prev">—</div>'}</div>`;
           
      return `${jdBtn}<div class="kgroup"><h4>📋 Purpose</h4><div class="jdbox">${escapeH(lib.jd || '—')}</div></div>
        <div class="kgroup"><h4>✅ Key Responsibilities</h4>${respH}</div>
        <div class="kgroup"><h4>🧭 Where it sits · decision rights</h4><div class="jdbox" style="background:#f3f7ff">${escapeH(lib.where || '—')}</div></div>
        ${kpiSection}
        <div class="kgroup"><h4>🔄 Why the KPIs changed</h4><div class="why">${escapeH(lib.rationale || '—')}</div></div>`;
    }

    function renderLanding() {
      const lv = document.getElementById('landingView');
      
      const p = state.currentUser; 
      if (!p) {
        lv.innerHTML = '<div style="padding: 30px; text-align: center; color: var(--mut);">No user data found.</div>';
        return;
      }
      
      const lib = M.library[p.archetype] || { direct: [], contrib: [] };
      const cflag = p.country && p.country !== '—' ? `<span class="chip">${p.country === 'ID' ? '🇮🇩' : '🇵🇭'} ${p.country}</span>` : '';
      
      const headerHtml = `
        <div class="ph" style="background:linear-gradient(135deg,${DDEEP[p.dept]||'#2E5496'},${shade(DCOLOR[p.dept]||'#2E5496',0.62)})">
          <div class="nm">${escapeH(p.name)}</div>
          <div class="tt">${escapeH(p.title)}</div>
          <div class="meta">
            <span class="chip">${escapeH(p.dept)}</span>
            <span class="chip">${escapeH(p.team)}</span>
            ${p.area ? `<span class="chip">📍 ${escapeH(p.area)}</span>` : ''}
            ${cflag}
            <span class="chip">Reports to: ${escapeH(p.parent||'—')}</span>
          </div>
        </div>`;
      
      const bodyHtml = `
        <div class="pb">
          <div class="rolechip">Role archetype · ${escapeH(p.archetype)}</div>
          ${specBody(lib)}
          <div class="kgroup">
            <h4>🕒 Previous KPIs (FY25 2H)</h4>
            <div class="prev">${escapeH(p.prev_kpis||'—')}</div>
          </div>
          ${p.flag ? `<div class="note">⚠ ${escapeH(p.flag)}</div>` : ''}
        </div>`;
        
      lv.innerHTML = headerHtml + bodyHtml;
    }

    // -------------------------------------------------------------------------
    // RENDER: TREE
    // -------------------------------------------------------------------------
    let openSet = new Set();
    function nodeKey(n, path) { return path + '/' + (n.label); }

    function renderTree() {
      const t = document.getElementById('tree'); t.innerHTML = '';
      const root = rootNode();
      t.appendChild(renderNode(root, '', 0, true));
      document.getElementById('hint').textContent = 'Click a branch to expand or collapse teams.';
    }
    
    function renderNode(n, path, depth, autoOpen) {
      const wrap = document.createElement('div'); wrap.className = 'node';
      const key = nodeKey(n, path);
      const row = document.createElement('div'); row.className = 'nrow' + (n.kind === 'root' ? ' rootcard' : '') + (n.leaf ? ' leaf' : '');
      const hasKids = !n.leaf;
      const rail = `<div class="rail" style="background:${n.color}"></div>`;
      const chev = hasKids ? `<div class="chev">▶</div>` : `<div class="chev"></div>`;
      
      let icon = '';
      if (n.isPerson || n.kind === 'person' || n.kind === 'manager') icon = `<div class="av" style="background:${n.color}">${initials(n.person.name)}</div>`;
      else if (n.icon !== undefined) icon = `<div class="av" style="background:${n.color}">${n.icon || ''}</div>`;
      
      const tag = n.kind === 'dept' ? `<span class="tag lead">LEAD: ${(HEADS[n.label] || '').split(' · ')[0] || shortLead(n)}</span>`
          : (n.kind === 'manager' || n.isPerson) ? `<span class="tag lead">LEADS ${n.count}</span>` : '';
      
      const cnt = (n.count !== undefined && n.kind !== 'person') ? `<div class="cnt">${n.count}</div>` : '';
      
      row.innerHTML = rail + chev + icon + `<div class="body"><div class="lab">${escapeH(n.label)}</div><div class="sub">${escapeH(n.sub || '')}</div></div>` + tag + cnt;
      wrap.appendChild(row);
      
      let kidsBox = null;
      function toggle() {
        if (n.leaf) { 
           // JD Panel opening disabled to prevent seeing others' data
           return; 
        }
        if (kidsBox) { const open = kidsBox.style.display !== 'none'; kidsBox.style.display = open ? 'none' : ''; row.classList.toggle('open', !open); openSet[open ? 'delete' : 'add'](key); return; }
        kidsBox = document.createElement('div'); kidsBox.className = 'kids';
        n.children().forEach((c, i) => { const el = renderNode(c, key, depth + 1); el.style.animationDelay = (i * 18) + 'ms'; kidsBox.appendChild(el); });
        wrap.appendChild(kidsBox); row.classList.add('open'); openSet.add(key);
      }
      
      row.onclick = toggle;
      if (autoOpen || openSet.has(key)) { toggle(); if (openSet.has(key)) row.classList.add('open'); }
      wrap._node = n; wrap._row = row; wrap._key = key;
      return wrap;
    }
    
    function escapeH(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;'); }

    // -------------------------------------------------------------------------
    // VIEW / TOOLBAR 
    // -------------------------------------------------------------------------
    function setView(v) {
      view = v; openSet = new Set(); 
      
      ['tabLanding', 'tabOrg'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('on', id.toLowerCase().includes(v));
      });

      const tb = document.getElementById('toolbar');
      if (tb) tb.style.display = (v === 'landing') ? 'none' : 'flex';

      const tr = document.getElementById('tree');
      if (tr) tr.classList.toggle('hidden', v === 'landing');

      const lv = document.getElementById('landingView');
      if (lv) lv.classList.toggle('hidden', v !== 'landing');

      if (v === 'landing') renderLanding();
      else renderTree();
    }

    function resetView() { openSet = new Set(); setView('landing'); }
    function expandTop() {
      const root = document.querySelector('#tree>.node'); if (!root) return;
      const row = root._row; if (!root.querySelector('.kids')) row.click();
      setTimeout(() => { root.querySelectorAll(':scope>.kids>.node').forEach(nd => { if (!nd._node.leaf && !nd.querySelector('.kids')) nd._row.click(); }); }, 60);
    }
    function collapseAll() { openSet = new Set(); renderTree(); }


    // -------------------------------------------------------------------------
    // AUTH LOGIC (WEBHOOK)
    // -------------------------------------------------------------------------
    async function unlock() {
      const empno = document.getElementById('gusr').value.trim();
      const password = document.getElementById('gpw').value;
      const errBox = document.getElementById('gerr');
      const btn = document.getElementById('gbtn');

      if (!empno || !password) {
        errBox.textContent = 'Please enter both Employee ID and Password.';
        return;
      }

      errBox.textContent = 'Authenticating...';
      btn.disabled = true;
      btn.textContent = 'Loading...';

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          body: JSON.stringify({ empno: empno, password: password })
        });

        const result = await response.json();

        if (result.success) {
          
          // Build structure from secure data
          buildFromSecureData(result.data); 
          
          // Set current logged in user
          state.currentUser = M.people.find(p => p.empno === empno) || M.people[0];
          
          // Hide Gate
          document.getElementById('gate').classList.add('hidden');
          ['hdr', 'app', 'foot'].forEach(id => document.getElementById(id).classList.remove('hidden'));

          document.getElementById('foot').textContent = `Source: Quipper secure webhook · Internal use only.`;

          setView('landing');

        } else {
          errBox.textContent = result.message || 'Login failed.';
          btn.disabled = false;
          btn.textContent = 'Enter';
        }
      } catch (e) {
        errBox.textContent = 'Connection error. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Enter';
      }
    }

    // -------------------------------------------------------------------------
    // BINDINGS
    // -------------------------------------------------------------------------
    document.getElementById('gbtn').onclick = unlock;
    document.getElementById('gpw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock() });

    // Focus first input on load
    document.getElementById('gusr').focus();
  </script>
</body>
</html>
